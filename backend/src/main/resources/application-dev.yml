# =====================================================
# application.yml — 운영 환경 설정
# DB 접속 정보는 환경변수로 주입 (코드에 하드코딩 금지)
# 로컬 실행: export DB_HOST=localhost DB_USER=root DB_PASS=password
# AWS   실행: /opt/app/.env 파일에서 주입
# =====================================================
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop        # 운영: validate (스키마 자동 변경 금지)
    show-sql: false
    open-in-view: false         # OSIV 비활성화 (성능)

server:
  port: ${SERVER_PORT:8080}

# CORS 허용 출처 (Next.js FE ALB DNS)
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

# Actuator (ALB 헬스 체크용)
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.example.noteapp: DEBUG
