  version: 1
  frontend:
    phases:
      preBuild:
        commands:
          - node -v
          - npm ci
      build:
        commands:
          - echo "Building Next.js app...."
          - npm run build
    artifacts:
      baseDirectory: .next
      files:
        - '**/*'
    cache:
      paths:
        - node_modules/**/*
        - .next/cache/**/*